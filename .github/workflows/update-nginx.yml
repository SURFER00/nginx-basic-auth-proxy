name: Update nginx base image

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve latest stable nginx alpine-slim tag
        id: versions
        run: |
          LATEST=$(
            curl -fsSL \
              "https://hub.docker.com/v2/repositories/library/nginx/tags/?page_size=100&name=alpine-slim" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-alpine-slim$' \
            | awk -F'[.-]' '$2 % 2 == 0' \
            | sort -V \
            | tail -1
          )

          if [[ -z "$LATEST" ]]; then
            echo "Could not determine latest stable nginx tag — aborting." >&2
            exit 1
          fi

          CURRENT=$(grep -E '^FROM nginx:' Dockerfile | sed 's/FROM nginx://')

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST"   >> "$GITHUB_OUTPUT"
          echo "Current: $CURRENT / Latest: $LATEST"

      - name: Update Dockerfile and push
        if: steps.versions.outputs.latest != steps.versions.outputs.current
        run: |
          sed -i \
            "s|^FROM nginx:.*|FROM nginx:${{ steps.versions.outputs.latest }}|" \
            Dockerfile

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "chore: bump nginx to ${{ steps.versions.outputs.latest }}"
          git push

      - name: Dispatch build workflow
        if: steps.versions.outputs.latest != steps.versions.outputs.current
        run: |
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-push-docker-image.yml/dispatches \
            -d '{"ref":"main"}'